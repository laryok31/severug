{% extends "base.html" %}

{% block title %}Общий чат | Север-Юг{% endblock %}

{% block extra_css %}
<style>
    /* ===== ОБЩИЙ ЧАТ ===== */
    .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 140px); /* Увеличили высоту */
        background: white;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        border: 1px solid #f1f5f9;
    }

    /* Шапка чата */
    .chat-header {
        padding: 20px 25px;
        background: linear-gradient(135deg, #4f46e5 0%, #818cf8 100%);
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .chat-header h3 {
        margin: 0;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .chat-header h3 i {
        font-size: 1.5rem;
    }

    .online-badge {
        background: rgba(255,255,255,0.2);
        padding: 5px 15px;
        border-radius: 30px;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 5px;
    }

    /* Информационная панель */
    .info-panel {
        background: #f8fafc;
        padding: 15px 25px;
        border-bottom: 1px solid #f1f5f9;
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        align-items: center;
    }

    .info-item {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #475569;
        font-size: 0.9rem;
    }

    .info-item i {
        color: #4f46e5;
        font-size: 1.1rem;
    }

    .ferry-status {
        background: #10b981;
        color: white;
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 0.8rem;
        font-weight: 600;
    }

    .ferry-status.warning {
        background: #f59e0b;
    }

    .ferry-status.danger {
        background: #ef4444;
    }

    /* Сообщения */
    .messages-container {
        flex: 1;
        overflow-y: auto;
        padding: 25px;
        background: #fafcff;
        max-height: calc(100vh - 250px); /* Больше места для сообщений */
    }

    .message-date-divider {
        text-align: center;
        margin: 20px 0;
        position: relative;
    }

    .message-date-divider::before {
        content: '';
        position: absolute;
        left: 0;
        top: 50%;
        width: 100%;
        height: 1px;
        background: #e2e8f0;
        z-index: 1;
    }

    .message-date-text {
        background: #fafcff;
        padding: 0 15px;
        color: #64748b;
        font-size: 0.8rem;
        position: relative;
        z-index: 2;
    }

    .message-wrapper {
        display: flex;
        gap: 15px;
        margin-bottom: 25px; /* Увеличили отступ между сообщениями */
        animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .message-wrapper.own {
        flex-direction: row-reverse;
    }

    .message-avatar {
        width: 50px; /* Увеличили аватар */
        height: 50px;
        border-radius: 16px;
        background: linear-gradient(135deg, #4f46e5 0%, #818cf8 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 1.3rem;
        flex-shrink: 0;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .message-avatar:hover {
        transform: scale(1.1);
    }

    .message-content {
        max-width: 70%;
    }

    .own .message-content {
        text-align: right;
    }

    .message-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px; /* Увеличили отступ */
        flex-wrap: wrap;
    }

    .own .message-header {
        justify-content: flex-end;
    }

    .message-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px; /* Увеличили отступ */
        flex-wrap: wrap;
    }

    .message-time {
        color: #94a3b8;
        font-size: 0.8rem;
    }

    .message-bubble {
        background: white;
        padding: 15px 20px; /* Увеличили padding */
        border-radius: 22px; /* Увеличили скругление */
        box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        border: 1px solid #f1f5f9;
        word-wrap: break-word;
        font-size: 1rem; /* Увеличили шрифт */
        line-height: 1.5;
    }

    .own .message-bubble {
        background: #eef2ff;
        border-color: #4f46e5;
    }

    .message-text {
        color: #1e293b;
        line-height: 1.6; /* Увеличили межстрочный интервал */
        font-size: 1rem;
    }

    /* Панель ввода */
    .input-area {
        padding: 20px 25px;
        background: white;
        border-top: 1px solid #f1f5f9;
    }

    .input-wrapper {
        display: flex;
        gap: 12px;
        align-items: center;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 30px;
        padding: 5px 5px 5px 20px;
    }

    .message-input {
        flex: 1;
        border: none;
        padding: 12px 0;
        font-size: 0.95rem;
        background: transparent;
    }

    .message-input:focus {
        outline: none;
    }

    .send-btn {
        width: 50px;
        height: 50px;
        border-radius: 25px;
        background: linear-gradient(135deg, #4f46e5 0%, #818cf8 100%);
        border: none;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .send-btn:hover {
        transform: scale(1.05);
    }

    /* Быстрые темы */
    .quick-topics {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
    }

    .quick-topic {
        padding: 6px 15px;
        background: #f1f5f9;
        border-radius: 30px;
        font-size: 0.85rem;
        color: #475569;
        cursor: pointer;
        transition: all 0.2s;
    }

    .quick-topic:hover {
        background: #4f46e5;
        color: white;
    }

    /* Адаптивность */
    @media (max-width: 768px) {
        .chat-container {
            height: calc(100vh - 140px);
        }

        .message-content {
            max-width: 85%;
        }

        .info-panel {
            flex-direction: column;
            align-items: flex-start;
            gap: 10px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="chat-container">
    <!-- Шапка -->
    <div class="chat-header">
        <h3>
            <i class="bi bi-chat-dots"></i>
            Общий чат Севастополя
        </h3>
        <div class="online-badge">
            <i class="bi bi-circle-fill" style="color: #10b981; font-size: 0.6rem;"></i>
            <span id="onlineCount">...</span>
        </div>
    </div>

    <!-- Информационная панель -->
    <div class="info-panel">
        <div class="info-item">
            <i class="bi bi-info-circle"></i>
            <span>Обсуждаем: паром, пробки, погоду</span>
        </div>
        <div class="info-item">
            <i class="bi bi-sun"></i>
            <span id="weatherInfo">Загрузка погоды...</span>
        </div>
        <div class="info-item">
            <i class="bi bi-ship"></i>
            <span id="ferryStatus" class="ferry-status">⏳ Загрузка...</span>
        </div>
    </div>

    <!-- Сообщения -->
    <div class="messages-container" id="messagesContainer">
        <!-- Сюда загрузятся сообщения -->
    </div>

    <!-- Панель ввода -->
    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" class="message-input" id="messageInput"
                   placeholder="Написать в чат..." onkeydown="if(event.key==='Enter') sendMessage()">
            <button class="send-btn" onclick="sendMessage()">
                <i class="bi bi-send"></i>
            </button>
        </div>

        <!-- Быстрые темы -->
        <div class="quick-topics">
            <span class="quick-topic" onclick="setTopic('🚢 Паром ходит?')">🚢 Паром</span>
            <span class="quick-topic" onclick="setTopic('🚦 Пробки на выезде')">🚦 Пробки</span>
            <span class="quick-topic" onclick="setTopic('🌊 Погода на море')">🌊 Погода</span>
            <span class="quick-topic" onclick="setTopic('🚗 Ищу попутчика')">🚗 Попутчик</span>
        </div>
    </div>
</div>

<script>
    let lastMessageId = 0;
    let onlineInterval;

    // Загрузка сообщений
    function loadMessages() {
        fetch('/api/city_chat/messages')
            .then(response => response.json())
            .then(messages => {
                const container = document.getElementById('messagesContainer');
                let currentDate = '';
                let html = '';

                messages.forEach(msg => {
                    // Добавляем разделитель даты
                    if (msg.date !== currentDate) {
                        currentDate = msg.date;
                        html += `
                            <div class="message-date-divider">
                                <span class="message-date-text">${msg.date}</span>
                            </div>
                        `;
                    }

                    const isOwn = msg.user_id == {{ user.id }};
                    html += `
                        <div class="message-wrapper ${isOwn ? 'own' : ''}" data-id="${msg.id}">
                            <div class="message-avatar" onclick="window.location.href='/profile/${msg.user_id}'">
                                ${msg.user_avatar}
                            </div>
                            <div class="message-content">
                                <div class="message-header">
                                    <span class="message-author">${msg.user_name}</span>
                                    <span class="message-time">${msg.time}</span>
                                </div>
                                <div class="message-bubble">
                                    <div class="message-text">${msg.text}</div>
                                </div>
                            </div>
                        </div>
                    `;

                    if (msg.id > lastMessageId) lastMessageId = msg.id;
                });

                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
    }

    // Отправка сообщения
    function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();

        if (!text) return;

        fetch('/api/city_chat/send', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ text: text })
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                addMessage(data.message);
                input.value = '';
            } else {
                console.error('Ошибка:', data.error);
                alert('Ошибка отправки: ' + (data.error || 'Неизвестная ошибка'));
            }
        })
        .catch(error => {
            console.error('Ошибка:', error);
            alert('Ошибка соединения');
        });
    }

    // Добавление нового сообщения
    function addMessage(msg) {
        const container = document.getElementById('messagesContainer');
        const today = new Date().toLocaleDateString('ru-RU').split('.').reverse().join('.');

        // Проверяем, нужен ли разделитель даты
        const lastDivider = container.querySelector('.message-date-divider:last-child');
        if (!lastDivider || !lastDivider.textContent.includes(today)) {
            const divider = document.createElement('div');
            divider.className = 'message-date-divider';
            divider.innerHTML = `<span class="message-date-text">${today}</span>`;
            container.appendChild(divider);
        }

        const isOwn = msg.user_id == {{ user.id }};
        const div = document.createElement('div');
        div.className = `message-wrapper ${isOwn ? 'own' : ''}`;
        div.dataset.id = msg.id;
        div.innerHTML = `
            <div class="message-avatar" onclick="window.location.href='/profile/${msg.user_id}'">
                ${msg.user_avatar}
            </div>
            <div class="message-content">
                <div class="message-header">
                    <span class="message-author">${msg.user_name}</span>
                    <span class="message-time">${msg.time}</span>
                </div>
                <div class="message-bubble">
                    <div class="message-text">${msg.text}</div>
                </div>
            </div>
        `;

        container.appendChild(div);
        container.scrollTop = container.scrollHeight;

        if (msg.id > lastMessageId) lastMessageId = msg.id;
    }

    // Быстрые темы
    function setTopic(topic) {
        document.getElementById('messageInput').value = topic;
        document.getElementById('messageInput').focus();
    }

    // Загрузка онлайн-пользователей
    function loadOnlineCount() {
        fetch('/api/chat/online')
            .then(response => response.json())
            .then(data => {
                document.getElementById('onlineCount').innerText = data.count + ' онлайн';
            });
    }

    // Загрузка погоды и статуса парома
    function loadWeatherAndFerry() {
        // Погода (бесплатное API)
        fetch('https://api.open-meteo.com/v1/forecast?latitude=44.62&longitude=33.53&current_weather=true')
            .then(response => response.json())
            .then(data => {
                const temp = data.current_weather.temperature;
                const code = data.current_weather.weathercode;

                const weatherIcons = {
                    0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️',
                    45: '🌫️', 48: '🌫️', 51: '🌧️', 53: '🌧️', 55: '🌧️'
                };

                document.getElementById('weatherInfo').innerHTML =
                    `${weatherIcons[code] || '☀️'} ${temp}°C`;
            });

        // Статус парома (имитация)
        const hour = new Date().getHours();
        const ferryStatus = document.getElementById('ferryStatus');

        if (hour >= 6 && hour <= 22) {
            if (hour >= 7 && hour <= 9 || hour >= 17 && hour <= 19) {
                ferryStatus.className = 'ferry-status warning';
                ferryStatus.innerHTML = '⏳ Паром: час пик';
            } else {
                ferryStatus.className = 'ferry-status';
                ferryStatus.innerHTML = '✅ Паром: работает';
            }
        } else {
            ferryStatus.className = 'ferry-status danger';
            ferryStatus.innerHTML = '❌ Паром: не работает';
        }
    }

    // Обновление каждые 5 секунд
    setInterval(() => {
        loadMessages();
        loadOnlineCount();
    }, 5000);

    // Инициализация
    loadMessages();
    loadOnlineCount();
    loadWeatherAndFerry();
</script>
{% endblock %}
